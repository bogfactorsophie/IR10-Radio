<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IR10 Radio</title>
    <style>
        body {
            font-family: Helvetica, Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 2rem 1rem;
        }
        .columns {
            display: flex;
            gap: 2rem;
            text-align: center;
        }
        .col-left {
            flex: 0 0 auto;
        }
        .col-right {
            flex: 1;
            text-align: left;
            padding-top: 4rem;
            border-left: 1px dashed #ccc;
            padding-left: 2rem;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            margin: 0.5rem 0;
        }
        button, input {
            font-family: inherit;
            font-size: inherit;
        }
        #station-image {
            width: 96px;
            height: 96px;
            object-fit: contain;
            background: #ccc;
        }
    </style>
</head>
<body>
    <div class="columns">
        <div class="col-left">
            <h1>IR10 Radio</h1>
            <section id="now-playing">
                <h2>Now Playing</h2>
                <img id="station-image" src="" alt="">
                <p id="status">Loading...</p>
                <button onclick="stop()">Stop</button>
            </section>
        </div>

        <div class="col-right">
            <section>
                <h2>Stations <span id="station-count"></span></h2>
                <ul id="station-list"></ul>
            </section>

            <section>
                <h2>Add Stations</h2>
                <form onsubmit="searchStations(event)">
                    <input type="text" id="search-query" placeholder="Search by station name" required>
                    <button type="submit">Search</button>
                    <button type="button" onclick="toggleAddUrl()">Advanced</button>
                </form>
                <ul id="search-results"></ul>
            </section>

            <section id="add-url-section" style="display:none">
                <h3>Add Station by URL</h3>
                <form onsubmit="addStation(event)">
                    <input type="text" id="add-name" placeholder="Station name" required>
                    <input type="url" id="add-url" placeholder="Stream URL" required>
                    <button type="submit" id="add-url-btn">Add</button>
                </form>
            </section>
        </div>
    </div>

    <script>
        const MAX_PRESETS = 6;
        let stationCount = 0;
        let stationUrls = new Set();
        let lastSearchResults = null;

        async function loadStations() {
            const res = await fetch("/stations");
            const stations = await res.json();
            stationCount = stations.length;
            stationUrls = new Set(stations.map(s => s.url));
            document.getElementById("station-count").textContent = `(${stationCount}/${MAX_PRESETS})`;
            const addUrlBtn = document.getElementById("add-url-btn");
            if (addUrlBtn) addUrlBtn.disabled = stationCount >= MAX_PRESETS;
            const list = document.getElementById("station-list");
            list.innerHTML = "";
            stations.forEach(s => {
                const li = document.createElement("li");
                li.textContent = s.name + " ";

                const upBtn = document.createElement("button");
                upBtn.textContent = "\u25B2";
                upBtn.onclick = () => moveStation(s.index, "up");
                li.appendChild(upBtn);

                const downBtn = document.createElement("button");
                downBtn.textContent = "\u25BC";
                downBtn.onclick = () => moveStation(s.index, "down");
                li.appendChild(downBtn);

                const playBtn = document.createElement("button");
                playBtn.textContent = "Play";
                playBtn.onclick = () => play(s.index);
                li.appendChild(playBtn);

                const removeBtn = document.createElement("button");
                removeBtn.textContent = "Remove";
                removeBtn.onclick = () => removeStation(s.index);
                li.appendChild(removeBtn);

                list.appendChild(li);
            });
            if (lastSearchResults) renderSearchResults(lastSearchResults);
        }

        async function loadNowPlaying() {
            const res = await fetch("/now-playing");
            const data = await res.json();
            const el = document.getElementById("status");
            const img = document.getElementById("station-image");
            if (data.state === "play") {
                el.textContent = data.show ? `${data.station} — ${data.show}` : data.station;
                img.src = data.image || "";
            } else {
                el.textContent = "Stopped";
                img.src = "";
            }
        }

        async function play(index) {
            await fetch(`/play/${index}`, { method: "POST" });
            loadNowPlaying();
        }

        async function stop() {
            await fetch("/stop", { method: "POST" });
            loadNowPlaying();
        }

        function toggleAddUrl() {
            const section = document.getElementById("add-url-section");
            section.style.display = section.style.display === "none" ? "" : "none";
        }

        async function addStation(e) {
            e.preventDefault();
            const name = document.getElementById("add-name").value;
            const url = document.getElementById("add-url").value;
            await fetch("/stations", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name, url })
            });
            document.getElementById("add-name").value = "";
            document.getElementById("add-url").value = "";
            loadStations();
        }

        function renderSearchResults(results) {
            const list = document.getElementById("search-results");
            list.innerHTML = "";
            if (results.length === 0) {
                list.innerHTML = "<li>No stations found</li>";
                return;
            }
            results.forEach(s => {
                const li = document.createElement("li");
                let label = s.name;
                const details = [s.country, s.tags, s.bitrate ? `${s.bitrate}kbps` : ""].filter(Boolean);
                if (details.length) label += ` (${details.join(" · ")})`;
                li.textContent = label + " ";
                const addBtn = document.createElement("button");
                if (stationUrls.has(s.url)) {
                    addBtn.textContent = "Added";
                    addBtn.disabled = true;
                } else if (stationCount >= MAX_PRESETS) {
                    addBtn.disabled = true;
                } else {
                    addBtn.textContent = "Add";
                }
                addBtn.onclick = async () => {
                    await fetch("/stations", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ name: s.name, url: s.url, image: s.image })
                    });
                    addBtn.textContent = "Added";
                    addBtn.disabled = true;
                    stationCount++;
                    loadStations();
                };
                li.appendChild(addBtn);
                list.appendChild(li);
            });
        }

        async function searchStations(e) {
            e.preventDefault();
            const query = document.getElementById("search-query").value;
            document.getElementById("search-results").innerHTML = "<li>Searching...</li>";
            const res = await fetch(`/search?q=${encodeURIComponent(query)}`);
            lastSearchResults = await res.json();
            renderSearchResults(lastSearchResults);
        }

        async function moveStation(index, direction) {
            await fetch(`/stations/${index}/move/${direction}`, { method: "POST" });
            loadStations();
        }

        async function removeStation(index) {
            await fetch(`/stations/${index}`, { method: "DELETE" });
            loadNowPlaying();
            loadStations();
        }

        loadStations();
        loadNowPlaying();
        setInterval(loadNowPlaying, 5000);
    </script>
</body>
</html>
