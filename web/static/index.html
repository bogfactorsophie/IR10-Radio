<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IR10 Radio</title>
    <style>
        body {
            font-family: Helvetica, Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 2rem 1rem;
        }
        .columns {
            display: flex;
            gap: 2rem;
            text-align: center;
        }
        .col-left {
            flex: 0 0 auto;
        }
        .col-right {
            flex: 1;
            text-align: left;
            padding-top: 4rem;
            border-left: 1px dashed #ccc;
            padding-left: 2rem;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            margin: 0.5rem 0;
        }
        button, input, select {
            font-family: inherit;
            font-size: inherit;
        }
        #station-image {
            width: 96px;
            height: 96px;
            object-fit: contain;
            background: #ccc;
        }
    </style>
</head>
<body>
    <div class="columns">
        <div class="col-left">
            <h1>IR10 Radio</h1>
            <section id="now-playing">
                <h2>Now Playing</h2>
                <img id="station-image" src="" alt="">
                <p id="status">Loading...</p>
                <button onclick="goStandby()">Standby</button>
            </section>

            <section>
                <h2>Dial</h2>
                <ul id="dial-list"></ul>
            </section>
        </div>

        <div class="col-right">
            <section>
                <h2>Library</h2>
                <ul id="library-list"></ul>
            </section>

            <section>
                <h2>Add Stations</h2>
                <form onsubmit="searchStations(event)">
                    <input type="text" id="search-query" placeholder="Search by station name" required>
                    <button type="submit">Search</button>
                    <button type="button" onclick="toggleAddUrl()">Advanced</button>
                </form>
                <ul id="search-results"></ul>
            </section>

            <section id="add-url-section" style="display:none">
                <h3>Add Station by URL</h3>
                <form onsubmit="addStation(event)">
                    <input type="text" id="add-name" placeholder="Station name" required>
                    <input type="url" id="add-url" placeholder="Stream URL" required>
                    <button type="submit">Add</button>
                </form>
            </section>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
