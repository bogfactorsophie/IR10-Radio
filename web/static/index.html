<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TR10</title>
    <link rel="stylesheet" href="/static/style.css?v=13">
</head>
<body>
    <header>
        <span class="brand">TR10</span>
        <button class="listen-btn" id="listen-btn" onclick="toggleListen()">listen here</button>
    </header>

    <main>
        <section class="dial-section">
            <div class="dial-container" id="dial-container">
                <div class="dial-face">
                    <div class="dial-pointer" id="dial-pointer"></div>
                    <div class="dial-center"></div>
                </div>
            </div>
            <div class="selection-hint" id="selection-hint"></div>
            <div class="status" id="status-bar">
                <span class="status-station" id="status-station"></span>
                <span class="status-show" id="status-show"></span>
            </div>
        </section>

        <section class="library-section">
            <h2>library</h2>
            <div class="library-grid" id="library-list"></div>

            <div class="search-section">
                <input type="text" id="search-query" placeholder="search stations"
                       maxlength="100">
                <div class="search-results" id="search-results"></div>
            </div>

            <details class="add-section">
                <summary>add by url</summary>
                <form id="add-url-form">
                    <input type="text" id="add-name" placeholder="station name" required>
                    <input type="url" id="add-url" placeholder="stream url" required>
                    <button type="submit">add</button>
                </form>
            </details>
        </section>
    </main>

    <script src="/static/app.js?v=13"></script>
</body>
</html>
