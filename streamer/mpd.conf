music_directory     "/var/lib/mpd/music"
playlist_directory  "/var/lib/mpd/playlists"
db_file             "/var/lib/mpd/database"
state_file          "/var/lib/mpd/state"
sticker_file        "/var/lib/mpd/sticker.sql"

bind_to_address     "0.0.0.0"
port                "6600"

log_level           "default"
auto_update         "yes"

audio_output {
    type        "alsa"
    name        "Audio Amp SHIM"
    mixer_type  "software"
    channels    "1"
}

audio_output {
    type        "httpd"
    name        "HTTP Stream"
    encoder     "lame"
    port        "8000"
    bitrate     "128"
    format      "44100:16:1"
    always_on   "yes"
    tags        "yes"
}
