services:
  streamer:
    build: ./streamer
    restart: unless-stopped
    devices:
      - /dev/snd:/dev/snd
    ports:
      - "6600:6600"
      - "8000:8000"
    volumes:
      - streamer-data:/var/lib/mpd
    networks:
      - radio
    healthcheck:
      test: ["CMD", "mpc", "status"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build: ./web
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - web-data:/data
    depends_on:
      - streamer
    environment:
      - DEFAULT_DIAL_POSITION=${DEFAULT_DIAL_POSITION:-}
      - DEFAULT_VOLUME=${DEFAULT_VOLUME:-}
    networks:
      - radio

  io:
    build: ./io
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/gpiomem:/dev/gpiomem
    depends_on:
      - web
    environment:
      - DEFAULT_DIAL_POSITION=${DEFAULT_DIAL_POSITION:-}
    networks:
      - radio

volumes:
  streamer-data:
  web-data:

networks:
  radio:
